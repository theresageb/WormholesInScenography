<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>Hello, AR World! • A-Frame</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/aframe-ar-hit-test-component@0.6.3/dist/aframe-ar-hit-test-component.min.js"></script>
    <meta name="description" content="Hello, AR World! • A-Frame">

    <script>
      AFRAME.registerComponent('follow-shadow', {
        schema: {type: 'selector'},
        init() {this.el.object3D.renderOrder = -1;},
        tick() {
          if (this.data) {
            this.el.object3D.position.copy(this.data.object3D.position);
            this.el.object3D.position.y-=0.001; // stop z-fighting
          }
        }
      });
    </script>
  </head>
  <body>
    <a-scene
      reflection="directionalLight: a-light[type=directional]"
      ar-hit-test="target: #objects;"
      renderer="colorManagement: true; exposure: 1; toneMapping: ACESFilmic"
      shadow="type: pcfsoft"
      xr-mode-ui="XRMode: xr"
    >
      <a-assets timeout="20000">
        <img id="treemap" src="treemap.png" crossorigin="anonymous" />
        <a-asset-item id="root" src="https://theresageb.github.io/WormholesInScenography/Roots.glb"></a-asset-item>
      </a-assets>
      
     <!-- <a-light type="directional" light="castShadow:false;" position="1 1 1" intensity="1.57" shadow-camera-automatic="#objects"></a-light> -->
      <a-camera position="0 20 0" wasd-controls="acceleration:10;" rotation="0 0 0"></a-camera>
      <a-entity id="objects" scale="1 1 1" position="0 0 0" shadow>
         <a-plane position="0 0 0" rotation="-90 0 0" width="16" height="16" color="#7BC8A4" src="#treemap" material="transparent: true"></a-plane>
        <a-entity gltf-model="#root" position="0 0 0" scale="0.005 0.005 0.005" color="black"></a-entity>
        
      </a-entity>
      <!-- <a-plane follow-shadow="#objects" material="shader:shadow" shadow="cast:false;" rotation="-90 0 0" width="2" height="2"></a-plane> -->
      <a-sky color="grey" hide-on-enter-ar></a-sky>
    </a-scene>
  </body>
</html>
