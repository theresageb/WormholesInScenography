<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <title>Markerless AR</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  </head>
  <body style="margin:0; overflow:hidden;">
    <a-scene
      embedded
      renderer="colorManagement: true"
      xr-mode-ui="enabled: true"
      webxr="optionalFeatures: hit-test;"
    >
      <a-assets>
        <img id="treemap" src="assets/treemap.png" crossorigin="anonymous" />
      </a-assets>

      <!-- Objekt: deine Karte -->
      <a-plane
        src="#treemap"
        material="transparent: true"
        rotation="-90 0 0"
        width="2"
        height="2"
        position="0 0 -1"
      ></a-plane>

      <a-camera></a-camera>
    </a-scene>
  </body>
</html>
