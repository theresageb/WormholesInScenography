<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    

    <title>Hello world!</title>
    <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.1/dist/mindar-image-aframe.prod.js"></script>
  </head>
  <body>
    <a-scene mindar-image="imageTargetSrc: https://cdn.glitch.global/65d9035a-c997-4429-bd69-ffc23ea5ca4f/targets.mind?v=1685527325159;" color-space="sRGB" renderer="colorManagement: true, physicallyCorrectLights">
      <a-camera position="0 0 0" look-controls="enabled: false"> 
<a-text value="Hello, World!" position="0 0 -1"></a-text>  </a-camera>
      <a-entity mindar-image-target="targetIndex: 0">
        <box color="orange" position="0 0 0" scale="1 1 1"></box>
      </a-entity>
      
    </a-scene>
  </body>
</html>
